<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLIX WEB v10 - محرك الإحالات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fb;
            --card: #ffffff;
            --border: #e5e5ea;
            --primary: #8b0000;
            --accent: #cc0000;
            --text: #1a1a2e;
            --text2: #555;
            --success: #008800;
            --error: #cc0000;
            --gold: #996600;
            --radius: 14px;
            --shadow: 0 2px 16px rgba(0,0,0,.05);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.7}
        
        .app{max-width:780px;margin:0 auto;padding:12px;display:flex;flex-direction:column;gap:12px}
        
        .header{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px;text-align:center;box-shadow:var(--shadow);position:relative;overflow:hidden}
        .header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--primary),var(--accent),var(--primary),transparent)}
        .header h1{font-size:3em;font-weight:900;color:var(--primary);letter-spacing:8px;line-height:1}
        .header .sub{font-size:.7em;color:#999;letter-spacing:5px;margin-top:2px}
        .header .v{display:inline-block;background:var(--primary);color:#fff;font-size:.65em;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:2px;margin-top:6px}
        .header .stats{display:flex;justify-content:center;gap:24px;margin-top:16px;flex-wrap:wrap}
        .header .stat{text-align:center;min-width:55px}
        .header .stat-val{font-size:1.6em;font-weight:800;color:var(--primary);line-height:1;font-family:monospace}
        .header .stat-lbl{font-size:.6em;color:#aaa;letter-spacing:2px;margin-top:2px}
        
        .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
        .card-title{font-weight:700;font-size:.8em;letter-spacing:3px;border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:16px;color:var(--text)}
        
        label{display:block;font-size:.68em;font-weight:700;color:var(--text2);letter-spacing:1px;margin-bottom:3px}
        input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'Cairo',sans-serif;font-size:.88em;margin-bottom:12px;transition:all .2s;background:#fafbfc}
        input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(139,0,0,.06);background:#fff}
        input.ltr{direction:ltr;text-align:left;font-family:monospace;font-size:.82em}
        
        .row{display:grid;grid-template-columns:1fr;gap:10px}
        @media(min-width:400px){.row{grid-template-columns:1fr 1fr}}
        @media(min-width:600px){.row{grid-template-columns:1fr 1fr 1fr}}
        
        .tiers{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
        .tier{padding:8px 12px;background:#fafbfc;border:1.5px solid var(--border);border-radius:6px;cursor:pointer;font-size:.72em;font-weight:600;letter-spacing:1px;transition:all .2s;text-align:center;flex:1;min-width:45px;user-select:none}
        .tier:hover{border-color:#bbb;background:#fff}
        .tier.active{background:#fff5f5;border-color:var(--primary);color:var(--primary);font-weight:700}
        
        .btn{width:100%;padding:15px;border:none;border-radius:8px;font-family:'Cairo',sans-serif;font-weight:700;font-size:.9em;cursor:pointer;letter-spacing:2px;transition:all .25s;position:relative;overflow:hidden}
        .btn:active{transform:scale(.96)}
        .btn-start{background:var(--primary);color:#fff;box-shadow:0 4px 16px rgba(139,0,0,.2)}
        .btn-start:hover{background:#a00000;transform:translateY(-1px);box-shadow:0 6px 24px rgba(139,0,0,.3)}
        .btn-stop{background:#fff;color:var(--accent);border:2px solid var(--accent);display:none}
        .btn-stop:hover{background:#fff5f5}
        
        .prog-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
        @media(min-width:400px){.prog-grid{grid-template-columns:1fr 1fr 1fr 1fr}}
        .prog-box{background:#fafbfc;border-radius:8px;padding:14px;text-align:center;border:1px solid #f0f0f3}
        .prog-val{font-size:1.8em;font-weight:900;line-height:1;font-family:monospace}
        .prog-val.s{color:var(--success)}.prog-val.e{color:var(--error)}.prog-val.p{color:var(--primary)}.prog-val.g{color:var(--gold)}
        .prog-lbl{font-size:.6em;color:#999;letter-spacing:1px;margin-top:2px}
        
        .bar{height:8px;background:#eee;border-radius:4px;overflow:hidden;margin:14px 0}
        .bar-fill{height:100%;background:linear-gradient(90deg,#660000,#cc0000,#ff3333);border-radius:4px;width:0;transition:width .4s;position:relative}
        .bar-fill::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:shimmer 2s infinite}
        @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
        
        .status{text-align:center;font-size:.78em;color:#666;letter-spacing:1px}
        
        .log-box{background:#1a1a2e;border-radius:8px;padding:10px;max-height:350px;overflow-y:auto;font-family:'SF Mono','Consolas',monospace;font-size:10px;line-height:1.7;color:#c0c0d0}
        .log-box::-webkit-scrollbar{width:3px}
        .log-box::-webkit-scrollbar-thumb{background:#444;border-radius:3px}
        .log-line{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.02);animation:slideIn .2s ease}
        @keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
        .log-success{color:#0c0}.log-error{color:#f44}.log-info{color:#4af}.log-warning{color:#fa0}.log-system{color:#c6f}
        
        .toasts{position:fixed;top:12px;left:12px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
        .toast{background:#fff;border-radius:10px;padding:12px 16px;box-shadow:0 8px 32px rgba(0,0,0,.15);font-size:.8em;pointer-events:auto;animation:toastIn .35s ease;border-right:3px solid var(--primary)}
        @keyframes toastIn{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
        @keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(60px)}}
        
        .pulse{display:inline-block;width:7px;height:7px;background:var(--success);border-radius:50%;animation:pulse 1.5s infinite;margin-left:5px;vertical-align:middle}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
        
        .hidden{display:none!important}
        
        @media(max-width:360px){
            .header h1{font-size:2em;letter-spacing:4px}
            .header .stats{gap:12px}
            .header .stat-val{font-size:1.2em}
            .card{padding:14px}
            input{padding:10px}
        }
    </style>
</head>
<body>
    <div class="toasts" id="toasts"></div>
    
    <div class="app">
        <!-- الهيدر -->
        <div class="header">
            <h1>FLIX</h1>
            <div class="sub">محرك الإحالات المتطور</div>
            <span class="v">v10.0</span>
            <div class="stats">
                <div class="stat"><div class="stat-val" id="sTotal">--</div><div class="stat-lbl">حساب</div></div>
                <div class="stat"><div class="stat-val" id="sActive">--</div><div class="stat-lbl">نشط</div></div>
                <div class="stat"><div class="stat-val" id="sPremium">--</div><div class="stat-lbl">ممتاز</div></div>
                <div class="stat"><div class="stat-val" id="sSpeed">--</div><div class="stat-lbl">إحالة/ث</div></div>
            </div>
        </div>
        
        <!-- الإعدادات -->
        <div class="card" id="configCard">
            <div class="card-title">إعدادات الإحالة</div>
            
            <label>رابط الإحالة</label>
            <input type="text" class="ltr" id="link" placeholder="https://t.me/BotName?start=CODE" autocomplete="off">
            
            <div class="row">
                <div><label>عدد الإحالات</label><input type="number" id="count" value="100" min="1" max="100000" step="1"></div>
                <div><label>التأخير (ثانية)</label><input type="number" id="delay" value="0.05" min="0.01" max="60" step="0.01"></div>
                <div><label>معرف الإشعارات</label><input type="text" id="notify" placeholder="اختياري"></div>
            </div>
            
            <label>مستوى الحساب</label>
            <div class="tiers" id="tiers">
                <div class="tier active" data-tier="">الكل</div>
                <div class="tier" data-tier="PREMIUM">ممتاز</div>
                <div class="tier" data-tier="HIGH">عالي</div>
                <div class="tier" data-tier="STANDARD">قياسي</div>
            </div>
            
            <button class="btn btn-start" id="sBtn" onclick="startEngine()">بدء الإحالات</button>
            <button class="btn btn-stop" id="xBtn" onclick="stopEngine()">إيقاف فوري</button>
        </div>
        
        <!-- التقدم -->
        <div class="card hidden" id="progCard">
            <div class="card-title">التقدم <span class="pulse"></span></div>
            
            <div class="prog-grid">
                <div class="prog-box"><div class="prog-val s" id="pSuccess">0</div><div class="prog-lbl">نجح</div></div>
                <div class="prog-box"><div class="prog-val e" id="pFail">0</div><div class="prog-lbl">فشل</div></div>
                <div class="prog-box"><div class="prog-val p" id="pRemain">0</div><div class="prog-lbl">متبقي</div></div>
                <div class="prog-box"><div class="prog-val g" id="pChannels">0</div><div class="prog-lbl">قنوات</div></div>
            </div>
            
            <div class="bar"><div class="bar-fill" id="pBar"></div></div>
            <div class="status" id="pStatus">في انتظار البدء...</div>
        </div>
        
        <!-- السجل -->
        <div class="card hidden" id="logCard">
            <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
                <span>سجل العمليات</span>
                <button onclick="clearLog()" style="background:none;border:1px solid #ddd;padding:5px 14px;border-radius:6px;cursor:pointer;font-family:'Cairo';font-size:.7em;letter-spacing:1px">مسح</button>
            </div>
            <div class="log-box" id="logBox"></div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io(window.location.origin, {
            transports: ['websocket', 'polling'],
            reconnection: true,
            reconnectionDelay: 500,
            reconnectionDelayMax: 5000,
            reconnectionAttempts: Infinity
        });
        
        let running = false;
        let jobId = null;
        
        // تحميل حالة النظام
        async function loadStatus() {
            try {
                const r = await fetch('/api/status');
                const d = await r.json();
                
                const format = n => n >= 1000000 ? (n/1000000).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(1)+'K' : n;
                
                document.getElementById('sTotal').textContent = format(d.accounts.total);
                document.getElementById('sActive').textContent = format(d.accounts.active);
                document.getElementById('sPremium').textContent = format(d.accounts.premium);
                document.getElementById('sSpeed').textContent = d.processed || '0';
                
                if (!d.telethon) {
                    log('تحذير: وضع المحاكاة - للحصول على إحالات حقيقية قم بتثبيت Telethon', 'warning');
                }
            } catch(e) {
                console.error('فشل تحميل الحالة:', e);
            }
        }
        
        // أحداث WebSocket
        socket.on('connect', () => log('تم الاتصال بالمحرك', 'success'));
        
        socket.on('disconnect', () => {
            log('انقطع الاتصال - جاري إعادة المحاولة...', 'warning');
        });
        
        socket.on('reconnect', () => log('تمت إعادة الاتصال', 'success'));
        
        socket.on('log', d => log(d.msg, d.type));
        
        socket.on('progress_update', d => {
            document.getElementById('pSuccess').textContent = d.success || 0;
            document.getElementById('pFail').textContent = d.fail || 0;
            document.getElementById('pRemain').textContent = (d.total - d.current) || 0;
            document.getElementById('pChannels').textContent = d.channels || 0;
            document.getElementById('pBar').style.width = (d.percentage || 0) + '%';
            document.getElementById('pStatus').textContent = 
                `${d.current}/${d.total} (${d.percentage}%) | ${d.speed} إحالة/ث | ${d.elapsed} ثانية`;
            document.getElementById('sSpeed').textContent = d.speed || 0;
        });
        
        socket.on('job_completed', d => {
            running = false;
            document.getElementById('sBtn').classList.remove('hidden');
            document.getElementById('xBtn').classList.add('hidden');
            document.getElementById('pStatus').textContent = 
                `اكتمل | ${d.success}/${d.total} | ${d.rate}% | ${d.duration} ثانية`;
            log(`========================================`, 'system');
            log(`اكتملت المهمة: ${d.job_id}`, 'success');
            log(`نجح: ${d.success} | فشل: ${d.fail} | قنوات: ${d.channels}`, 'info');
            log(`النسبة: ${d.rate}% | المدة: ${d.duration} ثانية | السرعة: ${d.speed}/ث`, 'info');
            log(`========================================`, 'system');
            toast(`اكتملت المهمة | ${d.success} إحالة ناجحة | ${d.rate}%`);
            loadStatus();
        });
        
        // بدء الإحالات
        async function startEngine() {
            if (running) return;
            
            const link = document.getElementById('link').value.trim();
            const count = parseInt(document.getElementById('count').value);
            const delay = parseFloat(document.getElementById('delay').value);
            const tier = document.querySelector('.tier.active')?.dataset?.tier || '';
            
            if (!link || !link.includes('t.me/')) {
                alert('الرجاء إدخال رابط إحالة صحيح يحتوي على t.me/');
                return;
            }
            
            if (isNaN(count) || count < 1) {
                alert('الرجاء إدخال عدد صحيح');
                return;
            }
            
            try {
                const r = await fetch('/api/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({link, count, delay, tier})
                });
                
                const d = await r.json();
                
                if (d.error) {
                    alert('خطأ: ' + d.error);
                    return;
                }
                
                running = true;
                jobId = d.job_id;
                
                document.getElementById('sBtn').classList.add('hidden');
                document.getElementById('xBtn').classList.remove('hidden');
                document.getElementById('progCard').classList.remove('hidden');
                document.getElementById('logCard').classList.remove('hidden');
                document.getElementById('logBox').innerHTML = '';
                
                log(`بدء المهمة: ${d.job_id}`, 'success');
                log(`عدد الإحالات: ${d.accounts} | البوت: @${d.bot}`, 'info');
                log(`الوقت المقدر: ${d.estimated_seconds} ثانية`, 'info');
                log(`Telethon: ${d.telethon ? 'حقيقي' : 'محاكاة'}`, d.telethon ? 'success' : 'warning');
                
                toast(`تم البدء | ${d.accounts} إحالة إلى @${d.bot}`);
                
            } catch(e) {
                log('خطأ في الاتصال: ' + e.message, 'error');
            }
        }
        
        // إيقاف الإحالات
        function stopEngine() {
            running = false;
            document.getElementById('sBtn').classList.remove('hidden');
            document.getElementById('xBtn').classList.add('hidden');
            document.getElementById('pStatus').textContent = 'تم الإيقاف يدوياً';
            log('تم إيقاف المحرك', 'warning');
            toast('تم إيقاف المحرك');
        }
        
        // إضافة سجل
        function log(msg, type) {
            const box = document.getElementById('logBox');
            if (!box) return;
            
            const line = document.createElement('div');
            line.className = 'log-line log-' + (type || 'info');
            const time = new Date().toLocaleTimeString('ar-EG', {hour12: false});
            line.textContent = `[${time}] ${msg}`;
            box.appendChild(line);
            box.scrollTop = box.scrollHeight;
            
            // حد أقصى 500 سطر
            while (box.children.length > 500) {
                box.removeChild(box.firstChild);
            }
        }
        
        function clearLog() {
            const box = document.getElementById('logBox');
            if (box) box.innerHTML = '';
            log('تم مسح السجل', 'system');
        }
        
        function toast(msg) {
            const container = document.getElementById('toasts');
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            container.appendChild(t);
            
            setTimeout(() => {
                t.style.animation = 'toastOut .3s ease forwards';
                setTimeout(() => t.remove(), 300);
            }, 3500);
            
            // حد أقصى 5 إشعارات
            while (container.children.length > 5) {
                container.removeChild(container.firstChild);
            }
        }
        
        // اختيار المستوى
        document.getElementById('tiers').addEventListener('click', e => {
            if (e.target.classList.contains('tier')) {
                document.querySelectorAll('.tier').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
            }
        });
        
        // اختصارات لوحة المفاتيح
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                running ? stopEngine() : startEngine();
            }
            if (e.ctrlKey && e.key === 'l') {
                e.preventDefault();
                document.getElementById('link').focus();
            }
        });
        
        // بدء التشغيل
        loadStatus();
        setInterval(loadStatus, 15000);
        log('FLIX WEB v10.0 جاهز للعمل', 'system');
        log('السيرفر مستقر | الإحالات جاهزة', 'info');
    </script>
</bo
